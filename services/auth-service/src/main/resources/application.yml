server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cadence
    username: ${DB_USER:cadence}
    password: ${DB_PASSWORD:cadence_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${SUPABASE_JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health
